<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>어학 루틴 체크표 PRO</title>

<style>

body{
    font-family:sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:10px;
}

.since{
    text-align:right;
    color:#666;
    font-size:14px;
    margin-bottom:15px;
}

.year-box{
    background:#f7f7f7;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.year-title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.year-stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

.lang-card{
    background:white;
    border-radius:15px;
    padding:15px;
    text-align:center;
    box-shadow:0 0 5px rgba(0,0,0,0.08);
}

.lang-card h3{
    margin:0;
    font-size:20px;
}

.lang-card p{
    margin-top:10px;
    font-size:32px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
}

th,td{
    border:1px solid #ddd;
    text-align:center;
    padding:14px;
    font-size:18px;
}

th{
    background:#f0f0f0;
}

.study-cell,
.checkbox{
    cursor:pointer;
    user-select:none;
    transition:0.15s;
}

.study-cell:hover,
.checkbox:hover{
    background:#f5f5f5;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#666;
    line-height:1.6;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:25px;
}

button{
    flex:1;
    padding:18px;
    border:none;
    border-radius:15px;
    background:#222;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.92;
}

@media(max-width:700px){

th,td{
    padding:10px;
    font-size:14px;
}

.lang-card h3{
    font-size:16px;
}

.lang-card p{
    font-size:24px;
}

button{
    font-size:14px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>📚 어학 루틴 체크표 PRO</h1>

<div class="subtitle">
모바일 자동 저장 · 주간 체크 · 연간 통계
</div>

<div class="since">
Since 26.05.17
</div>

<div class="year-box">

<div class="year-title" id="yearLabel">
2026년 학습횟수
</div>

<div class="year-stats">

<div class="lang-card">
<h3>영어</h3>
<p id="englishCount">0</p>
</div>

<div class="lang-card">
<h3>중국어</h3>
<p id="chineseCount">0</p>
</div>

<div class="lang-card">
<h3>독일어</h3>
<p id="germanCount">0</p>
</div>

<div class="lang-card">
<h3>스페인어</h3>
<p id="spanishCount">0</p>
</div>

<div class="lang-card">
<h3>아랍어</h3>
<p id="arabicCount">0</p>
</div>

</div>
</div>

<table>

<tr>
<th>언어</th>
<th>월</th>
<th>화</th>
<th>수</th>
<th>목</th>
<th>금</th>
<th>토</th>
<th>일</th>
<th>비고</th>
</tr>

<tr data-lang="english">
<th>영어</th>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="checkbox"></td>
<td>취침 전</td>
</tr>

<tr data-lang="chinese">
<th>중국어</th>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td>취침 전</td>
</tr>

<tr data-lang="german">
<th>독일어</th>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="checkbox"></td>
<td>저녁 활용</td>
</tr>

<tr data-lang="spanish">
<th>스페인어</th>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td>저녁 활용</td>
</tr>

<tr data-lang="arabic">
<th>아랍어</th>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="study-cell">30</td>
<td class="checkbox"></td>
<td class="checkbox"></td>
<td>취침 전</td>
</tr>

</table>

<div class="footer">
✅ 셀을 터치하면 완료 체크됩니다.<br>
데이터는 브라우저에 자동 저장됩니다.
</div>

<div class="button-group">

<button onclick="resetWeek()">
새 주 시작하기<br>
(체크 초기화)
</button>

<button onclick="newYear()">
한 해 시작하기<br>
(1년 횟수 초기화)
</button>

</div>

</div>

<script>

let currentYear = localStorage.getItem("currentYear") || 2026;

let yearlyCounts = JSON.parse(localStorage.getItem("yearlyCounts")) || {

english:0,
chinese:0,
german:0,
spanish:0,
arabic:0

};

document.getElementById("yearLabel").innerText =
currentYear + "년 학습횟수";

updateCounts();

const cells = document.querySelectorAll(".study-cell, .checkbox");

cells.forEach((cell,index)=>{

cell.dataset.original = cell.innerHTML;

const saved = localStorage.getItem("cell"+index);

if(saved==="checked"){
cell.innerHTML="✅";
}

cell.addEventListener("click",()=>{

if(cell.innerHTML==="✅"){

cell.innerHTML = cell.dataset.original;
decreaseCount(cell);

}else{

cell.innerHTML="✅";
increaseCount(cell);

}

saveState();

});

});

function increaseCount(cell){

const row = cell.parentElement.dataset.lang;

yearlyCounts[row]++;

updateCounts();

}

function decreaseCount(cell){

const row = cell.parentElement.dataset.lang;

if(yearlyCounts[row] > 0){

yearlyCounts[row]--;

}

updateCounts();

}

function updateCounts(){

document.getElementById("englishCount").innerText =
yearlyCounts.english;

document.getElementById("chineseCount").innerText =
yearlyCounts.chinese;

document.getElementById("germanCount").innerText =
yearlyCounts.german;

document.getElementById("spanishCount").innerText =
yearlyCounts.spanish;

document.getElementById("arabicCount").innerText =
yearlyCounts.arabic;

localStorage.setItem(
"yearlyCounts",
JSON.stringify(yearlyCounts)
);

}

function saveState(){

cells.forEach((cell,index)=>{

if(cell.innerHTML==="✅"){

localStorage.setItem("cell"+index,"checked");

}else{

localStorage.removeItem("cell"+index);

}

});

}

function resetWeek(){

cells.forEach((cell,index)=>{

cell.innerHTML = cell.dataset.original;

localStorage.removeItem("cell"+index);

});

}

function newYear(){

currentYear++;

localStorage.setItem("currentYear",currentYear);

document.getElementById("yearLabel").innerText =
currentYear + "년 학습횟수";

yearlyCounts = {

english:0,
chinese:0,
german:0,
spanish:0,
arabic:0

};

updateCounts();

resetWeek();

alert(currentYear + "년이 시작되었습니다!");

}

</script>

</body>
</html>
